<!DOCTYPE html>
<html>
<head>
<title>Moshiur Rahman - AI Art</title>
<style>
body{background:#111;color:white;font-family:Arial;text-align:center;margin:0;}
h1{color:#00bcd4;padding:20px;}
p{color:#aaa;}
.gallery{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;padding:20px;}
.gallery img{width:300px;height:300px;object-fit:cover;border-radius:10px;}
</style>
</head>
<body>
<h1>Moshiur Rahman - AI Art Portfolio</h1>
<p>Email: moshirrahman25834@gmail.com</p>
<div class="gallery" id="gallery"></div>
<script>
fetch('https://api.github.com/repos/moshirrahman25834-ops/MY-PORTFOLIO/contents/')
.then(r=>r.json())
.then(files=>{
files.filter(f=>f.name.match(/\.(png|jpg|jpeg)$/i))
.forEach(f=>{
var img=document.createElement('img');
img.src=f.download_url;
document.getElementById('gallery').appendChild(img);
});
});
</script>
</body>
</html>
